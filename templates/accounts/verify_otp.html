{% extends 'base.html' %}

{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header" style="background: linear-gradient(135deg, #2980b9, #3498db);">
            <div class="auth-logo">
                <i class="fas fa-shield-alt fa-3x"></i>
            </div>
            <h3 class="auth-title">Verify OTP</h3>
            <p class="auth-subtitle">Enter the 6-digit code sent to your email</p>
        </div>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    <i class="fas fa-info-circle me-2"></i> {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="post" class="auth-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <div class="input-field">
                    <input type="email" name="email" class="form-control" 
                           value="{{ email }}" placeholder="Enter your email" required readonly>
                    <i class="fas fa-envelope field-icon"></i>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">OTP Code</label>
                <div class="input-field">
                    <input type="text" name="otp" class="form-control" 
                           placeholder="Enter 6-digit OTP" required maxlength="6" autocomplete="off">
                    <i class="fas fa-key field-icon"></i>
                </div>
                <small class="form-text">OTP valid for 10 minutes</small>
            </div>
            
            <button type="submit" class="btn-login">
                <i class="fas fa-check-circle me-2"></i> Verify OTP
            </button>
        </form>
        
        <div class="auth-footer">
            <p><a href="/resend-otp/">← Resend OTP</a> | <a href="/forgot-password/">Try Different Email</a></p>
        </div>
    </div>
</div>

<style>
.auth-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
    padding: 30px;
}
.auth-card {
    background: white;
    border-radius: 40px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.3);
    overflow: hidden;
    max-width: 500px;
    width: 100%;
}
.auth-header {
    padding: 40px;
    text-align: center;
    color: white;
}
.auth-logo {
    width: 80px;
    height: 80px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
}
.auth-title {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 10px;
}
.auth-subtitle {
    font-size: 14px;
    opacity: 0.9;
}
.auth-form {
    padding: 40px;
}
.form-group {
    margin-bottom: 20px;
}
.form-label {
    font-weight: 600;
    color: #2c3e50;
    margin-bottom: 8px;
    display: block;
}
.input-field {
    position: relative;
}
.input-field .form-control {
    width: 100%;
    padding: 12px 45px;
    border: 1px solid #e9ecef;
    border-radius: 12px;
    font-size: 14px;
}
.input-field .form-control:focus {
    border-color: #2980b9;
    outline: none;
}
.input-field .field-icon {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #adb5bd;
}
.form-text {
    font-size: 11px;
    color: #6c757d;
    margin-top: 5px;
    display: block;
}
.btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #2980b9, #3498db);
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    cursor: pointer;
}
.btn-login:hover {
    transform: translateY(-2px);
}
.auth-footer {
    text-align: center;
    padding: 0 40px 40px;
}
.auth-footer a {
    color: #2980b9;
    text-decoration: none;
    margin: 0 5px;
}
.auth-footer a:hover {
    text-decoration: underline;
}
.alert {
    margin: 20px 40px 0;
    padding: 12px;
    border-radius: 12px;
    font-size: 13px;
}
.alert-success { background: #d4edda; color: #155724; }
.alert-danger { background: #f8d7da; color: #721c24; }
.alert-warning { background: #fff3cd; color: #856404; }
</style>
{% endblock %}
