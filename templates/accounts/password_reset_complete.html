{% extends 'base.html' %}

{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header" style="background: linear-gradient(135deg, #27ae60, #2ecc71);">
            <div class="auth-logo">
                <i class="fas fa-check-circle fa-3x"></i>
            </div>
            <h3 class="auth-title">Password Reset Complete!</h3>
            <p class="auth-subtitle">Your password has been changed</p>
        </div>
        
        <div class="auth-form text-center">
            <i class="fas fa-check-circle fa-4x text-success mb-3 d-block"></i>
            <p>Your password has been set successfully.</p>
            <p>You may now log in with your new password.</p>
            <a href="{% url 'login' %}" class="btn-login mt-3 d-block text-center text-white text-decoration-none">
                Login Now
            </a>
        </div>
    </div>
</div>

<style>
    .auth-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
        padding: 30px;
    }
    .auth-card {
        background: white;
        border-radius: 40px;
        box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        overflow: hidden;
        max-width: 500px;
        width: 100%;
        animation: slideUp 0.6s ease-out;
    }
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .auth-header {
        padding: 50px 40px 35px;
        text-align: center;
        color: white;
    }
    .auth-logo {
        width: 90px;
        height: 90px;
        background: rgba(255,255,255,0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
    }
    .auth-title {
        font-size: 32px;
        font-weight: 800;
        margin-bottom: 10px;
    }
    .auth-subtitle {
        font-size: 15px;
        opacity: 0.9;
    }
    .auth-form {
        padding: 40px;
        text-align: center;
    }
    .btn-login {
        display: inline-block;
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #27ae60, #2ecc71);
        border: none;
        border-radius: 14px;
        color: white;
        font-weight: 700;
        font-size: 16px;
        text-decoration: none;
        transition: all 0.3s;
    }
    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(39,174,96,0.4);
    }
</style>
{% endblock %}
