{% extends 'base.html' %}

{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fas fa-graduation-cap fa-3x"></i>
            </div>
            <h3 class="auth-title">Welcome Back!</h3>
            <p class="auth-subtitle">Login to access your dashboard</p>
        </div>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    <i class="fas fa-info-circle me-2"></i> {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="post" class="auth-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-user me-2"></i> Username
                </label>
                <div class="input-field">
                    <input type="text" name="username" class="form-control" 
                           placeholder="Enter your username" required autofocus>
                    <i class="fas fa-user field-icon"></i>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-lock me-2"></i> Password
                </label>
                <div class="input-field">
                    <input type="password" name="password" class="form-control" 
                           placeholder="Enter your password" required id="password">
                    <i class="fas fa-lock field-icon"></i>
                    <i class="fas fa-eye-slash toggle-password" onclick="togglePassword()" id="toggleIcon"></i>
                </div>
            </div>
            
            <div class="form-options">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember"> Remember Me
                </label>
                <a href="/forgot-password/" class="forgot-link">
                    <i class="fas fa-key me-1"></i> Forgot Password?
                </a>
            </div>
            
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt me-2"></i> Login
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Don't have an account? <a href="/signup/">Create Account</a></p>
        </div>
    </div>
</div>

<style>
.auth-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
    padding: 30px;
}
.auth-card {
    background: white;
    border-radius: 40px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.3);
    overflow: hidden;
    max-width: 500px;
    width: 100%;
}
.auth-header {
    background: linear-gradient(135deg, #667eea, #764ba2);
    padding: 40px;
    text-align: center;
    color: white;
}
.auth-logo {
    width: 80px;
    height: 80px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
}
.auth-title {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 10px;
}
.auth-subtitle {
    font-size: 14px;
    opacity: 0.9;
}
.auth-form {
    padding: 40px;
}
.form-group {
    margin-bottom: 20px;
}
.form-label {
    font-weight: 600;
    color: #2c3e50;
    margin-bottom: 8px;
    display: block;
}
.input-field {
    position: relative;
}
.input-field .form-control {
    width: 100%;
    padding: 12px 45px;
    border: 1px solid #e9ecef;
    border-radius: 12px;
    font-size: 14px;
}
.input-field .form-control:focus {
    border-color: #667eea;
    outline: none;
}
.input-field .field-icon {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #adb5bd;
}
.toggle-password {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #adb5bd;
}
.form-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}
.checkbox-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #6c757d;
}
.forgot-link {
    color: #667eea;
    text-decoration: none;
    font-size: 13px;
}
.forgot-link:hover {
    text-decoration: underline;
}
.btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    cursor: pointer;
}
.btn-login:hover {
    transform: translateY(-2px);
}
.auth-footer {
    text-align: center;
    padding: 0 40px 40px;
}
.auth-footer a {
    color: #667eea;
    text-decoration: none;
}
.alert {
    margin: 20px 40px 0;
    padding: 12px;
    border-radius: 12px;
    font-size: 13px;
}
.alert-success { background: #d4edda; color: #155724; }
.alert-danger { background: #f8d7da; color: #721c24; }
</style>

<script>
function togglePassword() {
    var pwd = document.getElementById("password");
    var icon = document.getElementById("toggleIcon");
    if (pwd.type === "password") {
        pwd.type = "text";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    } else {
        pwd.type = "password";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    }
}
</script>
{% endblock %}
