{% extends 'base.html' %}

{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header" style="background: linear-gradient(135deg, #f39c12, #e67e22);">
            <div class="auth-logo">
                <i class="fas fa-key fa-3x"></i>
            </div>
            <h3 class="auth-title">Forgot Password?</h3>
            <p class="auth-subtitle">Enter your email to reset password</p>
        </div>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    <i class="fas fa-info-circle me-2"></i> {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="post" class="auth-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-envelope me-2"></i> Email Address
                </label>
                <div class="input-field">
                    <input type="email" name="email" class="form-control" 
                           placeholder="Enter your registered email" required autofocus>
                    <i class="fas fa-envelope field-icon"></i>
                </div>
                <small class="form-text">We'll send you a password reset link</small>
            </div>
            
            <button type="submit" class="btn-login">
                <i class="fas fa-paper-plane me-2"></i> Send Reset Link
            </button>
        </form>
        
        <div class="auth-footer">
            <p><a href="{% url 'login' %}"><i class="fas fa-arrow-left me-1"></i> Back to Login</a></p>
        </div>
    </div>
</div>

<style>
    .auth-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
        padding: 30px;
    }
    .auth-card {
        background: white;
        border-radius: 40px;
        box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        overflow: hidden;
        max-width: 500px;
        width: 100%;
        animation: slideUp 0.6s ease-out;
    }
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .auth-header {
        padding: 50px 40px 35px;
        text-align: center;
        color: white;
    }
    .auth-logo {
        width: 90px;
        height: 90px;
        background: rgba(255,255,255,0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
    }
    .auth-title {
        font-size: 32px;
        font-weight: 800;
        margin-bottom: 10px;
    }
    .auth-subtitle {
        font-size: 15px;
        opacity: 0.9;
    }
    .auth-form {
        padding: 40px 40px 30px;
    }
    .form-group {
        margin-bottom: 25px;
    }
    .form-label {
        font-weight: 600;
        color: #2c3e50;
        margin-bottom: 8px;
        display: block;
        font-size: 14px;
    }
    .input-field {
        position: relative;
    }
    .input-field .form-control {
        width: 100%;
        padding: 14px 48px;
        border: 2px solid #e9ecef;
        border-radius: 14px;
        font-size: 15px;
        transition: all 0.3s;
        background: #f8f9fa;
    }
    .input-field .form-control:focus {
        border-color: #f39c12;
        background: white;
        box-shadow: 0 0 0 4px rgba(243,156,18,0.1);
        outline: none;
    }
    .input-field .field-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: #adb5bd;
        font-size: 14px;
    }
    .input-field .form-control:focus + .field-icon {
        color: #f39c12;
    }
    .form-text {
        font-size: 11px;
        color: #6c757d;
        margin-top: 6px;
        display: block;
    }
    .btn-login {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #f39c12, #e67e22);
        border: none;
        border-radius: 14px;
        color: white;
        font-weight: 700;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s;
    }
    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(243,156,18,0.4);
    }
    .auth-footer {
        text-align: center;
        padding: 0 40px 40px;
    }
    .auth-footer a {
        color: #f39c12;
        text-decoration: none;
        font-weight: 600;
    }
    .auth-footer a:hover {
        text-decoration: underline;
    }
    .alert {
        margin: 20px 40px 0;
        border-radius: 14px;
        padding: 12px 18px;
        font-size: 13px;
    }
</style>
{% endblock %}
