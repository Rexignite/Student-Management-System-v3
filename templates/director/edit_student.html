{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Edit Student</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="row">
            <div class="col-md-6">
                <div class="form-group">
                    <label>First Name:</label>
                    <input type="text" name="first_name" class="form-control" value="{{ student.user.first_name }}" required>
                </div>
                <div class="form-group">
                    <label>Last Name:</label>
                    <input type="text" name="last_name" class="form-control" value="{{ student.user.last_name }}" required>
                </div>
                <div class="form-group">
                    <label>Student ID:</label>
                    <input type="text" name="student_id" class="form-control" value="{{ student.student_id }}" required>
                </div>
                <div class="form-group">
                    <label>Full Name:</label>
                    <input type="text" name="full_name" class="form-control" value="{{ student.full_name }}" required>
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-group">
                    <label>Class Name:</label>
                    <input type="text" name="class_name" class="form-control" value="{{ student.class_name }}" required>
                </div>
                <div class="form-group">
                    <label>Roll Number:</label>
                    <input type="text" name="roll_number" class="form-control" value="{{ student.roll_number }}" required>
                </div>
                <div class="form-group">
                    <label>Parent Name:</label>
                    <input type="text" name="parent_name" class="form-control" value="{{ student.parent_name }}">
                </div>
                <div class="form-group">
                    <label>Parent Phone:</label>
                    <input type="text" name="parent_phone" class="form-control" value="{{ student.parent_phone }}">
                </div>
                <div class="form-group">
                    <label>Address:</label>
                    <textarea name="address" class="form-control" rows="3">{{ student.address }}</textarea>
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-success mt-3">Update Student</button>
        <a href="{% url 'manage_students' %}" class="btn btn-secondary mt-3">Cancel</a>
    </form>
</div>
{% endblock %}
