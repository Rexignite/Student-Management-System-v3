{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-warning text-dark">
                    <h4><i class="fas fa-undo me-2"></i> Reset Password</h4>
                    <p class="mb-0">User: {{ target_user.username }}</p>
                </div>
                <div class="card-body">
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle me-2"></i>
                        Default password will be set based on role:
                        <ul class="mt-2 mb-0">
                            <li>Student: <code>student@123</code></li>
                            <li>Teacher: <code>teacher@123</code></li>
                            <li>Director: <code>director@123</code></li>
                        </ul>
                    </div>
                    
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-warning" onclick="return confirm('Are you sure? This will reset the password to default.')">
                            <i class="fas fa-undo"></i> Reset to Default Password
                        </button>
                        <a href="/director/users/" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
