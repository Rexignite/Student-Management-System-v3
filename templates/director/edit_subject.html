{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-header" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                    <h4 class="mb-0"><i class="fas fa-edit me-2"></i>Edit Subject</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label">Subject Code *</label>
                            <input type="text" name="subject_code" class="form-control" value="{{ subject.subject_code }}" required>
                            <small class="text-muted">Unique code for subject</small>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Subject Name *</label>
                            <input type="text" name="subject_name" class="form-control" value="{{ subject.subject_name }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Assign Teacher</label>
                            <select name="teacher" class="form-control">
                                <option value="">-- Select Teacher (Optional) --</option>
                                {% for teacher in teachers %}
                                    <option value="{{ teacher.id }}" {% if subject.teacher.id == teacher.id %}selected{% endif %}>
                                        {{ teacher.full_name }} - {{ teacher.subject }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="3">{{ subject.description }}</textarea>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-primary">💾 Update Subject</button>
                            <a href="{% url 'manage_subjects' %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
