{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card shadow-lg border-0">
                <div class="card-header" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                    <h4 class="mb-0"><i class="fas fa-chalkboard-teacher me-2"></i>Assign Teacher to Subject</h4>
                </div>
                <div class="card-body">
                    <h5>Subject: <strong class="text-primary">{{ subject.subject_name }}</strong> 
                        <span class="badge bg-secondary">{{ subject.subject_code }}</span>
                    </h5>
                    <hr>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">Select Teacher</label>
                            <select name="teacher_id" class="form-control">
                                <option value="">-- Remove Teacher --</option>
                                {% for teacher in teachers %}
                                    <option value="{{ teacher.id }}" {% if subject.teacher.id == teacher.id %}selected{% endif %}>
                                        {{ teacher.full_name }} - {{ teacher.subject }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-check-circle me-1"></i> Assign Teacher
                            </button>
                            <a href="{% url 'manage_subjects' %}" class="btn btn-secondary">
                                <i class="fas fa-times-circle me-1"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
